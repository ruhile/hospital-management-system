<div class="auth-container fade-in">
  <div class="auth-card">
    <div class="auth-header">
      <img src="assets/icons/hospital-logo.png" alt="Hospital Logo" class="auth-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/883/883407.png'">
      <h2>Hospital Management Portal</h2>
      <p>Log in to manage appointments, doctors, and patients</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            class="form-control" 
            [class.invalid]="submitted && f['email'].errors"
            placeholder="name@hospital.com"
            autocomplete="email">
        </div>
        <div *ngIf="submitted && f['email'].errors" class="form-error">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Please enter a valid email address</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            class="form-control" 
            [class.invalid]="submitted && f['password'].errors"
            placeholder="••••••••"
            autocomplete="current-password">
        </div>
        <div *ngIf="submitted && f['password'].errors" class="form-error">
          <i class="fas fa-exclamation-circle"></i>
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <button type="submit" [disabled]="loading" class="btn btn-primary btn-block">
        <span *ngIf="!loading">Sign In <i class="fas fa-arrow-right"></i></span>
        <span *ngIf="loading" class="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
